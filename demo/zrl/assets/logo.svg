<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200">

  <!-- ═══ YOGA MEDITATION FIGURE (gold outline) ═══ -->

  <!-- Radiance lines above head -->
  <line x1="76" y1="17" x2="76" y2="4"  stroke="#C9A254" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="66" y1="20" x2="58" y2="9"  stroke="#C9A254" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="86" y1="20" x2="94" y2="9"  stroke="#C9A254" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="57" y1="29" x2="46" y2="21" stroke="#C9A254" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="95" y1="29" x2="106" y2="21" stroke="#C9A254" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="76" cy="35" r="16" fill="none" stroke="#C9A254" stroke-width="2.5"/>

  <!-- Torso -->
  <path d="M68,51 C61,70 57,94 56,118 C65,125 76,127 87,125 C95,121 98,113 97,118 C96,94 92,70 84,51"
        fill="none" stroke="#C9A254" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left arm to knee -->
  <path d="M60,72 C46,88 34,104 26,124"
        fill="none" stroke="#C9A254" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right arm to knee -->
  <path d="M92,72 C106,88 118,104 126,124"
        fill="none" stroke="#C9A254" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left hand -->
  <circle cx="23" cy="127" r="5" fill="none" stroke="#C9A254" stroke-width="2"/>

  <!-- Right hand -->
  <circle cx="129" cy="127" r="5" fill="none" stroke="#C9A254" stroke-width="2"/>

  <!-- Lotus legs outer shape -->
  <path d="M17,126 C36,152 56,166 76,169 C96,166 116,152 135,126 C118,170 100,182 76,185 C52,182 34,170 17,126 Z"
        fill="none" stroke="#C9A254" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Inner lotus lines -->
  <path d="M34,138 C52,152 64,157 76,159" fill="none" stroke="#C9A254" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M118,138 C100,152 88,157 76,159" fill="none" stroke="#C9A254" stroke-width="1.5" stroke-linecap="round"/>


  <!-- ═══ ZRL LETTERS (dark navy) ═══ -->
  <text x="150" y="183"
        font-family="'Cormorant Garamond','EB Garamond',Georgia,serif"
        font-size="150" font-weight="700" fill="#0D1B3E" letter-spacing="5">ZRL</text>


  <!-- ═══ BOTANICAL PLANTS (gold) ═══ -->

  <!-- Main curved branch arching over ZRL -->
  <path d="M160,82 C182,56 208,74 234,64 C256,56 274,40 302,53 C324,63 344,48 368,54 C388,60 404,48 420,56"
        fill="none" stroke="#C9A254" stroke-width="1.8" stroke-linecap="round"/>

  <!-- ─ Z area ─ -->
  <!-- Leaf Z-1: upper left -->
  <path d="M172,75 C182,52 196,62 192,76 C184,78 172,75 172,75 Z" fill="#C9A254"/>
  <line x1="172" y1="76" x2="192" y2="65" stroke="#8B6B2E" stroke-width="0.9"/>

  <!-- Leaf Z-2: upper right -->
  <path d="M204,67 C214,45 228,56 224,70 C216,72 204,67 204,67 Z" fill="#C9A254"/>
  <line x1="204" y1="68" x2="224" y2="58" stroke="#8B6B2E" stroke-width="0.9"/>

  <!-- Leaf Z-3: hanging left -->
  <path d="M178,90 C170,106 170,120 176,128 C179,116 180,102 178,90 Z" fill="#C9A254" opacity="0.85"/>

  <!-- Leaf Z-4: small accent -->
  <path d="M194,72 C200,54 210,60 208,72 C202,74 194,72 194,72 Z" fill="#C9A254" opacity="0.8"/>

  <!-- Leaf Z-5: outer left hanging -->
  <path d="M166,98 C158,112 158,126 164,132 C167,120 168,106 166,98 Z" fill="#C9A254" opacity="0.72"/>

  <!-- Leaf Z-6: small inner right -->
  <path d="M216,80 C224,62 234,68 230,80 C224,82 216,80 216,80 Z" fill="#C9A254" opacity="0.78"/>


  <!-- ─ Z-R junction (stem down + leaves) ─ -->
  <path d="M236,64 C236,86 232,106 228,124"
        fill="none" stroke="#C9A254" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M228,93 C216,104 216,118 222,124 C225,112 227,100 228,93 Z" fill="#C9A254" opacity="0.85"/>
  <path d="M228,93 C240,106 240,120 234,126 C231,114 229,102 228,93 Z" fill="#C9A254" opacity="0.85"/>
  <circle cx="236" cy="63" r="3.5" fill="#C9A254"/>
  <circle cx="243" cy="58" r="2.5" fill="#C9A254"/>
  <circle cx="229" cy="58" r="2.5" fill="#C9A254"/>


  <!-- ─ R area ─ -->
  <!-- Leaf R-1: upper left of R -->
  <path d="M274,46 C284,26 298,36 294,50 C286,52 274,46 274,46 Z" fill="#C9A254"/>
  <line x1="274" y1="47" x2="294" y2="38" stroke="#8B6B2E" stroke-width="0.9"/>

  <!-- Leaf R-2: upper right of R curve -->
  <path d="M300,51 C312,30 326,42 321,56 C312,58 300,51 300,51 Z" fill="#C9A254"/>
  <line x1="300" y1="52" x2="321" y2="44" stroke="#8B6B2E" stroke-width="0.9"/>

  <!-- Leaf R-3: hanging down R body -->
  <path d="M286,63 C291,84 287,102 281,112 C279,94 280,76 286,63 Z" fill="#C9A254" opacity="0.85"/>

  <!-- Leaf R-4: small accent left of R -->
  <path d="M264,58 C270,40 280,46 278,60 C272,62 264,58 264,58 Z" fill="#C9A254" opacity="0.8"/>

  <!-- Leaf R-5: outer right of R hanging -->
  <path d="M314,68 C320,86 318,104 310,114 C309,96 308,80 314,68 Z" fill="#C9A254" opacity="0.75"/>


  <!-- ─ R-L junction berries ─ -->
  <circle cx="344" cy="50" r="4"   fill="#C9A254"/>
  <circle cx="352" cy="45" r="2.5" fill="#C9A254"/>
  <circle cx="336" cy="45" r="2.5" fill="#C9A254"/>


  <!-- ─ L area ─ -->
  <!-- Leaf L-1: upper left of L stem -->
  <path d="M350,56 C360,34 374,46 370,60 C362,62 350,56 350,56 Z" fill="#C9A254"/>
  <line x1="350" y1="57" x2="370" y2="50" stroke="#8B6B2E" stroke-width="0.9"/>

  <!-- Leaf L-2: upper right -->
  <path d="M374,52 C386,32 400,44 395,58 C387,60 374,52 374,52 Z" fill="#C9A254"/>
  <line x1="374" y1="53" x2="395" y2="48" stroke="#8B6B2E" stroke-width="0.9"/>

  <!-- Leaf L-3: hanging left of L stem -->
  <path d="M356,68 C348,86 348,102 354,112 C357,98 358,82 356,68 Z" fill="#C9A254" opacity="0.85"/>

  <!-- Leaf L-4: large right of L base -->
  <path d="M398,58 C408,78 406,98 398,112 C395,94 394,76 398,58 Z" fill="#C9A254" opacity="0.85"/>

  <!-- Leaf L-5: small mid L -->
  <path d="M366,70 C362,84 360,98 364,108 C368,98 370,84 366,70 Z" fill="#C9A254" opacity="0.8"/>

  <!-- Leaf L-6: outer far right hanging large -->
  <path d="M408,66 C418,88 416,110 408,122 C405,104 404,84 408,66 Z" fill="#C9A254" opacity="0.72"/>

  <!-- Leaf L-7: small extra left side -->
  <path d="M344,64 C336,78 336,92 342,100 C345,88 346,76 344,64 Z" fill="#C9A254" opacity="0.7"/>


  <!-- Terminal berries -->
  <circle cx="422" cy="56" r="4.5" fill="#C9A254"/>
  <circle cx="430" cy="51" r="3"   fill="#C9A254"/>
  <circle cx="434" cy="62" r="2"   fill="#C9A254"/>

</svg>
