<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Logo Sorabyte preview</title>
<style>
  body{margin:0;background:#000;color:#fff;font:14px system-ui;display:grid;place-items:center;min-height:100vh;gap:32px}
  .row{display:flex;align-items:center;gap:32px;background:#000;padding:24px;border:1px solid #222;border-radius:12px}
  .row.light{background:#fff;color:#000}
  .label{font-size:11px;opacity:.6;letter-spacing:.1em;text-transform:uppercase}
  img{display:block}
</style>
</head>
<body>
  <div class="row">
    <div><img src="logo-sb.svg" width="240" height="240"><div class="label">240px</div></div>
    <div><img src="logo-sb.svg" width="96" height="96"><div class="label">96px header</div></div>
    <div><img src="logo-sb.svg" width="32" height="32"><div class="label">32px favicon</div></div>
    <div><img src="logo-sb.svg" width="16" height="16"><div class="label">16px tab</div></div>
  </div>
  <div class="row light">
    <div><img src="logo-sb.svg" width="120" height="120"><div class="label">sobre blanco</div></div>
  </div>
</body>
</html>
